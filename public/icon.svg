<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_grad" cx="50%" cy="30%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#3d0a0a" />
      <stop offset="100%" stop-color="#1a0505" />
    </radialGradient>
    <linearGradient id="sp_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <filter id="glass_effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur" />
      <feOffset in="blur" dx="0" dy="10" result="offsetBlur" />
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg_grad)" />
  
  <!-- SP Monogram -->
  <g filter="url(#glass_effect)">
    <!-- Stylized S -->
    <path d="M180 180C180 150 210 140 240 140C270 140 300 150 300 180C300 210 270 220 240 230C210 240 180 250 180 280C180 310 210 320 240 320C270 320 300 310 300 280" 
          stroke="url(#sp_grad)" stroke-width="40" stroke-linecap="round" fill="none" />
    <!-- Stylized P -->
    <path d="M320 140V320M320 140H360C390 140 410 160 410 190C410 220 390 240 360 240H320" 
          stroke="url(#sp_grad)" stroke-width="40" stroke-linecap="round" fill="none" />
  </g>
  
  <!-- Subtle Gold Border -->
  <rect x="20" y="20" width="472" height="472" rx="108" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.3" />
</svg>
